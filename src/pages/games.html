<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Games</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <header>
        <!-- Include header component -->
        <div id="header-placeholder"></div>
        <p style="text-align: left; padding: 10px;"><a href="../index.html">Home</a></p>
    </header>

    <main>
        <h1>桌游清單 </h1>
        <nav style="color: black;">
            <a href="#Strategy-games">策略遊戲</a>
            <a href="#Party-games">派對遊戲</a>
            <a href="#Puzzle-games">益智遊戲</a>
            <a href="#Cooperative-games">合作遊戲</a>
            <a href="#Fraction-games">陣營遊戲</a>
        </nav>
        <div class="game-list">
            <!-- Game cards will be dynamically inserted here -->
            <table border="1" align="center" id="Strategy-games" width="100%">
                <caption>策略遊戲</caption>
                <thead>
                    <tr>
                        <th>遊戲名稱</th>
                        <th>玩家人數</th>
                        <th>遊戲時間</th>
                        <th>實體圖片</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content goes here -->
                     <tr>
                        <td>卡坦島</td>
                        <td>3-4人</td>
                        <td>75-120分鐘</td>
                        <td><img src="../images/catan.jpg" alt="卡坦島" width="200"></td>
                    </tr>
                    <tr>
                        <td>龍焰魔法鎮</td>
                        <td>1-5人</td>
                        <td>45-60分鐘</td>
                        <td><img src="../images/flamecraft.jpg" alt="龍焰魔法鎮" width="200"></td>
                    </tr>
                </tbody>
            </table>
            </br>
            <table border="1" align="center" id="Party-games" width="100%">
                <caption>派對遊戲</caption>
                <thead>
                    <tr>
                        <th>遊戲名稱</th>
                        <th>玩家人數</th>
                        <th>遊戲時間</th>
                        <th>實體圖片</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content goes here -->
                     <tr>
                        <td>妙語說書人</td>
                        <td>4-8人</td>
                        <td>30分鐘</td>
                        <td><img src="../images/dixit.jpg" alt="妙語說書人" width="200"></td>
                    </tr>
                </tbody>
            </table>
            </br>
            <table border="1" align="center" id="Puzzle-games" width="100%">
                <caption>益智遊戲</caption>
                <thead>
                    <tr>
                        <th>遊戲名稱</th>
                        <th>玩家人數</th>
                        <th>遊戲時間</th>
                        <th>實體圖片</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content goes here -->
                    <tr>
                    <tr>
                        <td>迷宮探險</td>
                        <td>2-4人</td>
                        <td>60分鐘</td>
                        <td><img src="../images/labyrinth-adventure.jpg" alt="迷宮探險" width="100"></td>
                    </tr>
                </tbody>
            </table>
            </br>
            <table border="1" align="center" id="Cooperative-games" width="100%">
                <caption>合作遊戲</caption>
                <thead>
                    <tr>
                        <th>遊戲名稱</th>
                        <th>玩家人數</th>
                        <th>遊戲時間</th>
                        <th>實體圖片</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content goes here -->
                     <tr>
                        <td>瘟疫危機</td>
                        <td>2-4人</td>
                        <td>45分鐘</td>
                        <td><img src="../images/pandemic.jpg" alt="瘟疫危機" width="100"></td>
                    </tr>
                </tbody>
            </table>
            </br>
            <table border="1" align="center" id="Fraction-games" width="100%">
                <caption>陣營遊戲</caption>
                <thead>
                    <tr>
                        <th>遊戲名稱</th>
                        <th>玩家人數</th>
                        <th>遊戲時間</th>
                        <th>實體圖片</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content goes here -->
                     <tr>
                        <td>碰!</td>
                        <td>4-7人</td>
                        <td>20-40分鐘</td>
                        <td><img src="../images/bang.jpg" alt="碰!" width="200"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <!-- Include footer component -->
        <div id="footer-placeholder"></div>
    </footer>

    <script src="../js/utils.js"></script>
    <script src="../js/game.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
